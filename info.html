<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Upper Room Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f7; 
            min-height: 100vh;
        }
        
        .header {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #ccc;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 { font-size: 18px; color: #333; margin-bottom: 5px; }
        .header .subtitle { font-size: 12px; color: #666; }
        
        .controls { 
            padding: 10px 15px; 
            background: white; 
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .controls button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            background: #e5e5ea;
            color: #333;
        }
        .controls button.active { background: #007aff; color: white; }

        .day-marker {
            text-align: center;
            padding: 20px 15px;
            font-size: 14px;
            color: #888;
            background: #f2f2f7;
            font-weight: 600;
        }

        .context-box {
            text-align: center;
            padding: 15px 15px;
            font-size: 13px;
            color: #555;
            background: #e8f4fd;
            margin: 10px auto;
            max-width: 600px;
            border-radius: 10px;
            line-height: 1.5;
        }

        .pentecost-box {
            text-align: center;
            padding: 20px 15px;
            font-size: 14px;
            color: white;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            margin: 10px auto;
            max-width: 600px;
            border-radius: 10px;
            font-weight: 600;
        }
        
        .chat-container { 
            padding: 15px; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        
        .message { 
            display: flex; 
            flex-direction: column; 
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.3s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .message.right { align-items: flex-end; }
        .message.left { align-items: flex-start; }
        
        .bubble {
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 70%;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .right .bubble { 
            background: #007aff; 
            color: white; 
            border-bottom-right-radius: 8px;
        }
        .left .bubble { 
            background: #e5e5ea; 
            color: black; 
            border-bottom-left-radius: 8px;
        }
        
        .contact-name { font-size: 11px; color: #666; margin-bottom: 3px; padding-left: 5px; }
        .right .contact-name { text-align: right; padding-right: 5px; padding-left: 0; }
        
        .timestamp { font-size: 10px; color: #999; margin-top: 4px; }
        .message.right .timestamp { text-align: right; }
        
        .read-receipt { 
            font-size: 11px; 
            color: #888; 
            padding-left: 5px; 
            margin-top: -3px;
        }
        .message.right .read-receipt { text-align: right; padding-right: 5px; }

        .char-peter { color: #d63031 !important; font-weight: 600; }
        .char-john { color: #0984e3 !important; font-weight: 600; }
        .char-marym { color: #6c5ce7 !important; font-weight: 600; }
        .char-thomas { color: #e17055 !important; font-weight: 600; }
        .char-mary { color: #a29bfe !important; font-weight: 600; }
        .char-joseph { color: #00b894 !important; font-weight: 600; }
        .char-cleopas { color: #fdcb6e !important; font-weight: 600; }

        .scroll-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #007aff;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: none;
            z-index: 100;
        }

        @keyframes messagePop {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .message.pop .bubble {
            animation: messagePop 0.2s ease-out;
        }

        @keyframes highlightFlash {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(0, 122, 255, 0.3); }
        }
        
        .message.flash .bubble {
            animation: highlightFlash 0.4s ease-out;
        }

        .new-indicator {
            background: #007aff;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .new-indicator.visible {
            opacity: 1;
        }

        .bubble.emotional {
            background: #ff6b6b !important;
            color: white !important;
        }

        .bubble.holy-spirit {
            background: linear-gradient(135deg, #007aff 0%, #a29bfe 100%) !important;
            color: white !important;
        }

        /* Fire for Pentecost */
        .bubble.pentecost-fire {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%) !important;
            color: white !important;
            font-weight: 600;
        }

        .typing-name {
            font-size: 12px;
            color: #666;
            padding-left: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>The Upper Room Chat</h1>
        <div class="subtitle" id="participant-count">8 participants</div>
    </div>

    <div class="controls">
        <button onclick="setSpeed(1)" id="speed-1">Fast (4 min)</button>
        <button onclick="setSpeed(2)" id="speed-2" class="active">Normal (10 min)</button>
        <button onclick="setSpeed(3)" id="speed-3">Slow (20 min)</button>
    </div>

    <div class="chat-container" id="chat"></div>

    <button class="scroll-btn" id="scroll-btn" onclick="scrollToBottom()">↓</button>

    <script>
        const messages = [
            // Day 1: Good Friday
            { day: "Day 1 – Good Friday", time: 30 },
            
            { 
                from: "Peter", 
                text: "They took Him. Just... walked right up and took Him.",

                charClass: "char-peter"

            {

                side: "left",

            },
            { 
                from: "Mary (mother)", 
                text: "Where is He? Let me see my son.", 
                side: "left",
                charClass: "char-mary",

            },

            { day: "", time: 45, note: "*He is led away to be crucified.*" },
            
            { 
                from: "John", 
                text: "They're taking Him to Golgotha. Now.", 
                side: "left",
                charClass: "char-john"

            { day: "", time: 60, note: "*The crucifixion begins.*" },
            
            {

                side: "left",
                charClass: "char-marym",

            { 
                from: "Peter", 
                text: "Three crosses. The middle one... I counted the hours. Three hours of darkness.",

            // THE EARTHQUAKE MOMENT
            { day: "", time: 62, note: "*The ground shook. Everyone felt it.*" },
            
            {

                side: "left",
                charClass: "char-john"
            },
            { 
                from: "Peter", 
                text: "The temple veil tore. I saw it. Right down the middle.", 
                side: "left",
                charClass: "char-peter"
            },

            // JESUS DIES
            { day: "", time: 65, note: "*It is finished.*" },
            
            { 
                from: "Mary (mother)", 
                text: "My son. My firstborn...", 
                side: "left",
                charClass: "char-mary",
                emotional: true
            },

            { day: "", time: 90 },
            
            { 
                from: "Joseph of Arimathea", 
                text: "I'm going to Pilate. I'll take the body.", 
                side: "left",
                charClass: "char-joseph"
            },
            {

                text: "I have spices. About seventy pounds. We won't let Him be forgotten.", 
                side: "left",
                charClass: "char-nicodemus"
            },

            { day: "", time: 120, note: "*Joseph and Nicodemus join the chat*" },
            
            { 
                from: "Peter", 
                text: "They put Him in a new tomb. A stone as big as a cart wheel rolled against it.", 
                side: "left",
                charClass: "char-peter"
            },
            { 
                from: "Mary Magdalene", 
                text: "I'm watching. I won't leave.", 
                side: "left",
                charClass: "char-marym"
            },

            // Day 2: Holy Saturday (with context)
            { day: "Day 2 – Holy Saturday", time: 150 },
            
            { 
                from: "", 
                text: "", 
                side: "left",
                context: true,
                content: "The disciples hide in the upper room. The women prepare spices but can't buy more until Sunday (it's a Sabbath). Fear hangs heavy. They don't know what comes next."
            },

            { day: "", time: 155 },
            
            { 
                from: "John", 
                text: "We're safe for now. But how long?", 
                side: "left",
                charClass: "char-john"
            },
            { 
                from: "Mary (mother)", 
                text: "I keep thinking of Simeon's words... 'a sword will pierce your own soul too.'", 
                side: "left",
                charClass: "char-mary",
                read: true
            },

            // Day 3: Easter Morning
            { day: "Day 3 – Resurrection Sunday", time: 200 },

            { 
                from: "Mary Magdalene", 
                text: "The stone. It's GONE.", 
                side: "left",
                charClass: "char-marym"
            },
            { 
                from: "Peter", 
                text: "What do you mean gone? Who moved it?", 
                side: "left",
                charClass: "char-peter"
            },

            // THE ANGEL (Mary's perspective)
            { 
                from: "Mary Magdalene", 
                text: "Two men... sitting where the body was. They asked why I'm crying.", 
                side: "left",
                charClass: "char-marym"
            },

            { 
                from: "Mary Magdalene", 
                text: "The tomb... it's EMPTY. They took Him! I don't know who!", 
                side: "left",
                charClass: "char-marym",
                read: true,
                emotional: true
            },

            { day: "", time: 210, note: "*Peter and John run to the tomb*" },

            { 
                from: "John", 
                text: "I got there first. Barely caught my breath.",

            { 
                from: "Peter",

                side: "left",
                charClass: "char-peter"
            },

            // THE FACE CLOTH (John 20:7)
            { 
                from: "Peter",

                side: "left",

            },

            // BLOOD STAINS (visceral detail)
            { 
                from: "John", 
                text: "I saw it too. The linen... still had the marks. The spices, the blood...", 
                side: "left",
                charClass: "char-john"
            },

            // THE MOMENT OF BELIEF
            { 
                from: "Peter", 
                text: "This wasn't stolen. Thieves don't fold things.", 
                side: "left",
                charClass: "char-peter",
                read: true,
                emotional: true
            },

            // MARY SEES JESUS
            { 
                from: "Mary Magdalene", 
                text: "They asked me why I'm crying. I said they took my Lord...", 
                side: "left",
                charClass: "char-marym"
            },

            { 
                from: "Mary Magdalene", 
                text: "He called my name. Just... 'Mary.' I know that voice.", 
                side: "left",
                charClass: "char-marym",
                emotional: true
            },

            // Road to Emmaus (Full Story)
            { day: "", time: 280, note: "*Later that evening*" },

            },
            {

            // The Stranger joins them
            {

                side: "left",
                charClass: "char-cleopas"
            },

            // Jesus explains Scripture
            { 
                from: "Cleopas", 
                text: "He started with Moses. All the prophets... explaining everything about Himself.", 
                side: "left",

            },

            {

                text: "We invited him to stay. Said 'the day is almost over.'", 
                side: "left",
                charClass: "char-cleopas"
            },

            // THE RECOGNITION MOMENT (Luke 24:30-31)
            { 
                from: "Cleopas",

                side: "left",

            },

            { 
                from: "Cleopas",

                side: "left",
                charClass: "char-cleopas",
                emotional: true
            },

            { day: "", time: 300, note: "*The disciples gathered in the upper room*" },

            { 
                from: "Peter", 
                text: "We're all here. Doors locked.",

                charClass: "char-peter"

            {

                text: "Unless I see the nail marks... unless I put my hand where He was pierced...",

                charClass: "char-thomas"
            },

            // JESUS APPEARS IN THE ROOM
            { day: "", time: 320, note: "*He appears in the room. Doors still locked.*" },

                from: "John",

                side: "left",

                from: "Thomas", 
                text: "My Lord... and my God.", 
                side: "right",
                charClass: "char-thomas",
                emotional: true
            },

            { day: "", time: 330, note: "*He breathes on them...*" },

            { 
                from: "Peter", 
                text: "He breathed on us. Said 'Receive the Holy Spirit.'", 
                side: "left",
                charClass: "char-peter"
            },

            // PENTECOST SETUP (Acts 1:4-5)
            { day: "", time: 340, note: "*He tells them to wait in Jerusalem.*" },

            { 
                from: "Peter", 
                text: "What now? Do we wait? Do we go back to fishing?", 
                side: "left",
                charClass: "char-peter"
            },

            // ASCENSION DAY TEASER
            { day: "", time: 350, note: "*Forty days later... He leads them out.*" },

            { 
                from: "Peter",

            },

            },

            { day: "", time: 365, note: "*Two men in white appear.*" },

                side: "left",

            },

            { 
                from: "Peter", 
                text: "Back to the upper room. All of us. Waiting for power.", 
                side: "left",
                charClass: "char-peter",
                read: true,
                emotional: true
            },

            // Day 50: Pentecost!
            { day: "Day 50 – The Day of Pentecost", time: 375 },
            
            { 
                from: "", 
                text: "", 
                side: "left",
                context: true,
                content: "The disciples are gathered together when suddenly... a sound like wind fills the room. Tongues of fire rest on each of them."
            },

            { 
                from: "Peter", 
                text: "Did you hear that? Like... a violent wind! Filled the whole house!",

                pentecostFire: true
            },

            {

            },

            // THEY SPEAK IN TONGUES (Acts 2:4)
            { 
                from: "Mary Magdalene", 
                text: "I'm... I'm speaking. But not knowing what words to choose.", 
                side: "left",
                charClass: "char-marym",
                emotional: true,

            },

            {

            {

            { day: "", time: 390, note: "*The Word spread.*" },

            {

                emotional: true

        // State
        let currentMsg = 0;
        let speedMultiplier = 1;
        let isPlaying = true;
        const baseDelay = 8000;

        function setSpeed(level) {
            speedMultiplier = level;
            document.querySelectorAll('.controls button').forEach((btn, i) => {
                btn.classList.toggle('active', i + 1 === level);
            });
        }

        function scrollToBottom() {
            const chat = document.getElementById('chat');
            chat.scrollTop = chat.scrollHeight;
        }

        function showScrollButton() {
            const chat = document.getElementById('chat');
            const scrollBtn = document.getElementById('scroll-btn');
            if (chat.scrollTop + chat.clientHeight < chat.scrollHeight - 100) {
                scrollBtn.style.display = 'block';
            } else {
                scrollBtn.style.display = 'none';
            }
        }

        function showNewIndicator() {
            const indicator = document.getElementById('new-indicator');
            if (indicator) {
                indicator.classList.add('visible');
                
                setTimeout(() => {
                    indicator.classList.remove('visible');
                }, 1500);
            }
        }

        function addMessage(msg, index) {
            const chat = document.getElementById('chat');
            
            if (msg.day && msg.time > 0) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-marker';
                dayDiv.textContent = msg.day;
                chat.appendChild(dayDiv);
            }

            // Context box for Holy Saturday & Pentecost
            if (msg.context === true) {
                let className = 'context-box';
                if (msg.day && msg.day.includes('Pentecost')) {
                    className += ' pentecost-box';
                }
                
                const contextDiv = document.createElement('div');
                contextDiv.className = className;
                contextDiv.innerHTML = `<em>${msg.content}</em>`;
                chat.appendChild(contextDiv);
            }

            if (msg.note && !msg.from) {
                const noteDiv = document.createElement('div');
                noteDiv.className = 'day-marker';
                noteDiv.innerHTML = `<em>${msg.note}</em>`;
                chat.appendChild(noteDiv);
            }

            if (msg.from && msg.text) {
                showNewIndicator();
                
                setTimeout(() => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${msg.side} pop flash`;
                    
                    const charClass = msg.charClass || 'char-peter';
                    const emotionalClass = msg.emotional ? 'emotional' : '';
                    const pentecostClass = (msg.pentecostFire) ? 'pentecost-fire' : '';
                    
                    msgDiv.innerHTML = `
                        <div class="contact-name"><span class="${charClass}">${msg.from}</span></div>
                        <div class="bubble ${emotionalClass} ${pentecostClass}">${msg.text}</div>
                        ${msg.read ? '<div class="read-receipt">Read</div>' : ''}
                        <div class="timestamp">${formatTime(msg.time)}</div>
                    `;
                    
                    chat.appendChild(msgDiv);
                    scrollToBottom();
                }, 100);
            }

            if (currentMsg + 1 < messages.length) {
                let delay = baseDelay / speedMultiplier;
                delay = delay * (0.7 + Math.random() * 0.5);
                
                setTimeout(() => {
                    currentMsg++;
                    play();
                }, delay);
            } else {
                isPlaying = false;
                const endDiv = document.createElement('div');
                endDiv.className = 'day-marker';
                endDiv.innerHTML = `<em style="color: #007aff">The story continues...</em>`;
                chat.appendChild(endDiv);
            }
        }

        function formatTime(minutes) {
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            const ampm = hours >= 12 ? 'PM' : 'AM';
            let h = hours % 12 || 12;
            return `${h}:${mins.toString().padStart(2, '0')} ${ampm}`;
        }

        function play() {
            if (!isPlaying) return;
            
            const msg = messages[currentMsg];
            addMessage(msg, currentMsg);
        }

        window.onload = () => {
            setTimeout(play, 1000);
            
            const chat = document.getElementById('chat');
            chat.addEventListener('scroll', showScrollButton);
            showScrollButton();
        };
    </script>
</body>
</html>
